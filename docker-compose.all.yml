services:
  ollama:
    image: ollama/ollama:latest
    container_name: voidfm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  mydj-host:
    build:
      context: .
      dockerfile: mydj-host/Dockerfile
      args:
        BACKEND: ${BACKEND:-cpu}
    container_name: voidfm-host
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    volumes:
      - ./mydj-host/config.toml:/app/config.toml:ro
      - ./models:/models:ro
    restart: unless-stopped

volumes:
  ollama-data:
