services:
  mydj-host:
    build:
      context: ./mydj-host
      dockerfile: Dockerfile
    container_name: voidfm-host
    ports:
      - "8000:8000"
    volumes:
      - ./mydj-host/config.toml:/app/config.toml:ro
      - ./models:/models:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
