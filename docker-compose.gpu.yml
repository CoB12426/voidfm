# GPU 使用時のオーバーライドファイル
# 使い方: docker compose -f docker-compose.all.yml -f docker-compose.gpu.yml up -d --build
#
# 前提:
#   - NVIDIA ドライバー 560 以降 (CUDA 12.6 対応に必要)
#   - Windows: Docker Desktop + WSL2 バックエンド
#   - Linux:   NVIDIA Container Toolkit がインストールされていること
#     (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html)

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
